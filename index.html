<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AP Psychology Vocabulary Review</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background-color: #e6f9e6; padding: 30px; position: relative; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 35px; border-radius: 18px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .logout-btn {
            position: fixed; top: 15px; right: 15px; padding: 6px 12px; background: #c73434; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; z-index: 999;
        }
        h1 { text-align: center; color: #2d8a2d; margin-bottom: 24px; font-size: 28px; }
        #quiz.active-quiz ~ h1 { display: none; }
        .auth-box { max-width: 400px; margin: 60px auto; padding: 30px; background: white; border-radius: 16px; box-shadow: 0 0 12px rgba(0,0,0,0.1); }
        .auth-box h2 { text-align: center; margin-bottom: 20px; color: #2d8a2d; }
        .auth-box input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
        .auth-btn { width: 100%; padding: 12px; background: #2d8a2d; color: white; border: none; border-radius: 8px; font-size: 16px; margin-top: 10px; cursor: pointer; }
        .tab { display: flex; margin-bottom: 20px; }
        .tab button { flex: 1; padding: 10px; border: none; background: #f0f0f0; cursor: pointer; font-size: 16px; }
        .tab button.active { background: #2d8a2d; color: white; }
        .msg { text-align: center; margin-top: 10px; font-size: 14px; }
        .user-info { text-align: center; margin-bottom: 15px; font-size: 16px; color: #2d8a2d; }
        .question-count { text-align: center; margin-bottom: 12px; font-size: 16px; }
        .question-count input { padding: 10px 15px; font-size: 16px; width: 100px; border-radius: 8px; border: 1px solid #ccc; text-align: center; }
        .start-section { text-align: center; margin-top: 20px; margin-bottom: 30px; }
        .start-btn { padding: 14px 32px; font-size: 18px; background-color: #2d8a2d; color: white; border: none; border-radius: 12px; cursor: pointer; }
        .question { font-size: 26px; margin: 40px 0; text-align: center; font-weight: bold; color: #222; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 40px 0; }
        .option { padding: 20px; background: #f0fdf0; border: 1px solid #b2e0b2; border-radius: 12px; font-size: 18px; cursor: pointer; transition: 0.2s; line-height: 1.4; text-align: center; }
        .option:hover { background: #c9f7c9; border-color: #8cd98c; }
        .option-main { font-weight: bold; font-size: 18px; margin-bottom: 4px; }
        .option-desc { font-size: 14px; color: #555; }
        .result { text-align: center; font-size: 22px; margin: 24px 0; color: #2d8a2d; font-weight: bold; }
        .wrong-words { margin-top: 30px; padding: 24px; background: #fff5f5; border-radius: 12px; }
        .wrong-words h3 { color: #c73434; margin-bottom: 16px; font-size: 22px; }
        .wrong-item { margin: 12px 0; padding: 12px; border-left: 5px solid #ff6b6b; background: white; border-radius: 8px; }
        .wrong-item strong { font-size: 19px; color: #c73434; }
        .wrong-item p { margin-top: 6px; font-size: 16px; color: #333; line-height: 1.5; }
        .vocab-book { margin-top: 30px; padding: 24px; background: #e6f9ff; border-radius: 12px; }
        .vocab-book h3 { color: #007acc; margin-bottom: 16px; font-size: 22px; }
        .restart-btn { display: block; margin: 30px auto; padding: 12px 24px; font-size: 17px; background: #2d8a2d; color: white; border: none; border-radius: 10px; cursor: pointer; }
        .hidden { display: none !important; }
        .perfect-msg { text-align: center; font-size: 20px; color: #2d8a2d; margin: 20px 0; font-weight: bold; }
        .nav-btn-wrap {
            display: flex; justify-content: center; gap: 30px; margin-top: 20px;
        }
        .nav-btn {
            padding: 8px 20px; font-size: 16px; background: #2d8a2d; color: #fff; border: none; border-radius: 8px; cursor: pointer;
        }
        .nav-btn:disabled {
            background: #aaa; cursor: not-allowed;
        }
    </style>
</head>
<body>
<div id="authPage">
    <div class="auth-box">
        <div class="tab">
            <button id="loginTab" class="active">Login</button>
            <button id="regTab">Register</button>
        </div>
        <div id="loginForm">
            <h2>Welcome Back</h2>
            <input id="loginUser" placeholder="Username" type="text">
            <input id="loginPwd" placeholder="Password" type="password">
            <button class="auth-btn" onclick="login()">Login</button>
            <div class="msg" id="loginMsg"></div>
        </div>
        <div id="regForm" class="hidden">
            <h2>Create Account</h2>
            <input id="regUser" placeholder="Username" type="text">
            <input id="regPwd" placeholder="Password" type="password">
            <button class="auth-btn" onclick="register()">Register</button>
            <div class="msg" id="regMsg"></div>
        </div>
    </div>
</div>

<div id="mainPage" class="hidden">
    <div class="container">
        <button class="logout-btn" onclick="logout()">Logout</button>
        <div class="user-info" id="userInfo"></div>
        <h1>AP Psychology Vocabulary Review</h1>

        <div class="question-count" id="settings">
            <label>Number of Questions:</label>
            <input type="number" id="customCount" min="1" max="30" value="10">
            <span style="font-size:14px;color:#666;">最多30题</span>
        </div>
        <div class="start-section">
            <button class="start-btn" onclick="startQuiz()">Start Practice</button>
        </div>

        <div id="quiz" class="hidden">
            <div class="question" id="word"></div>
            <div class="options" id="options"></div>
            <div class="nav-btn-wrap">
                <button class="nav-btn" id="prevBtn" onclick="prevQuestion()">上一题</button>
                <button class="nav-btn" id="nextBtn" onclick="nextQuestion()">下一题</button>
            </div>
        </div>

        <div id="result" class="hidden">
            <div class="result" id="score"></div>
            <div class="wrong-words hidden" id="wrongListEl"></div>
            <div class="vocab-book" id="vocabBook">
                <h3>📘 My Vocabulary Book</h3>
                <div id="vocabListEl"></div>
            </div>
            <button class="restart-btn" onclick="restart()">Restart</button>
        </div>
    </div>
</div>

<script>
let currentUser = null;
let progressSaved = JSON.parse(localStorage.getItem("quizProgress")) || null;
const MAX_QUESTION_NUM = 30;

function saveProgress() {
    let data = { currentQuestions, currentIndex, correctCount, wrongList, isFinish: false };
    localStorage.setItem("quizProgress", JSON.stringify(data));
}
function clearProgress() { localStorage.removeItem("quizProgress"); progressSaved = null; }
function saveFinishState() { let data = { isFinish: true }; localStorage.setItem("quizProgress", JSON.stringify(data)); }

function loadUsers() { return JSON.parse(localStorage.getItem("users")) || {}; }
function saveUsers(users) { localStorage.setItem("users", JSON.stringify(users)); }

function showLogin() { loginTab.classList.add("active"); regTab.classList.remove("active"); loginForm.classList.remove("hidden"); regForm.classList.add("hidden"); }
function showReg() { regTab.classList.add("active"); loginTab.classList.remove("active"); regForm.classList.remove("hidden"); loginForm.classList.add("hidden"); }
loginTab.onclick = showLogin; regTab.onclick = showReg;

function register() {
    let u = regUser.value.trim(), p = regPwd.value.trim();
    if (!u || !p) { regMsg.textContent="Fill all!"; regMsg.style.color="red"; return; }
    let users = loadUsers();
    if (users[u]) { regMsg.textContent="Username exists!"; regMsg.style.color="red"; return; }
    users[u] = { pwd: p, vocab: [], accuracy:0, quizDays:0, lastActive:"Never", quizDaysSet:{} };
    saveUsers(users);
    regMsg.textContent="Success! Login now."; regMsg.style.color="green";
    setTimeout(showLogin, 1200);
}

function login() {
    let u = loginUser.value.trim(), p = loginPwd.value.trim();
    if (!u || !p) { loginMsg.textContent="Fill all!"; loginMsg.style.color="red"; return; }
    let users = loadUsers();
    if (!users[u] || users[u].pwd !== p) { loginMsg.textContent="Wrong ID/Password"; loginMsg.style.color="red"; return; }
    currentUser = u; localStorage.setItem("currentUser", u);
    authPage.classList.add("hidden"); mainPage.classList.remove("hidden");
    userInfo.textContent = ""; renderVocabBook();

    let prog = JSON.parse(localStorage.getItem("quizProgress"));
    if (prog) {
        if (prog.isFinish) {
            settings.classList.remove("hidden"); document.querySelector(".start-section").classList.remove("hidden"); quiz.classList.add("hidden"); result.classList.add("hidden");
        } else {
            currentQuestions = prog.currentQuestions; currentIndex = prog.currentIndex; correctCount = prog.correctCount; wrongList = prog.wrongList;
            settings.classList.add("hidden"); document.querySelector(".start-section").classList.add("hidden"); quiz.classList.remove("hidden"); result.classList.add("hidden"); quiz.classList.add("active-quiz");
            showQuestion();
        }
    } else {
        settings.classList.remove("hidden"); document.querySelector(".start-section").classList.remove("hidden"); quiz.classList.add("hidden"); result.classList.add("hidden");
    }
}

function logout() {
    currentUser = null; localStorage.removeItem("currentUser");
    authPage.classList.remove("hidden"); mainPage.classList.add("hidden"); showLogin();
}

const vocabList = [

let currentQuestions = [], currentIndex = 0, correctCount = 0, wrongList = [];

function getUserVocab() { if (!currentUser) return []; return loadUsers()[currentUser].vocab || []; }
function saveUserVocab(list) { if (!currentUser) return; let users = loadUsers(); users[currentUser].vocab = list; saveUsers(users); }
function addToVocabBook(item) { let list = getUserVocab(); if (!list.some(i => i.word === item.word)) { list.push(item); saveUserVocab(list); } }
function renderVocabBook() {
    let list = getUserVocab();
    vocabListEl.innerHTML = list.length ? list.map(i => `
        <div class="wrong-item"><strong>${i.word}</strong><p>${i.correct}</p><p>${i.explain}</p></div>
    `).join('') : "<p>No vocabulary yet</p>";
}

function getRandomWrong(n, ans) {
    let pool = vocabList.filter(item => item.word !== ans.word);
    pool.sort(() => Math.random() - 0.5);
    return pool.slice(0, n);
}

function prevQuestion() {
    if (currentIndex > 0) { currentIndex--; saveProgress(); showQuestion(); }
}
function nextQuestion() {
    if (currentIndex < currentQuestions.length - 1) { currentIndex++; saveProgress(); showQuestion(); } else { showResult(); }
}

function startQuiz() {
    clearProgress();
    let inputNum = +customCount.value;
    let count = Math.max(1, Math.min(inputNum, MAX_QUESTION_NUM));
    customCount.value = count;
    currentQuestions = [...vocabList].sort(()=>Math.random()-0.5).slice(0, count);
    currentIndex = correctCount = 0; wrongList = [];
    settings.classList.add("hidden"); document.querySelector(".start-section").classList.add("hidden"); quiz.classList.remove("hidden"); result.classList.add("hidden");
    quiz.classList.add("active-quiz"); saveProgress(); showQuestion();
}

function showQuestion() {
    let q = currentQuestions[currentIndex];
    word.innerText = q.word; options.innerHTML = "";
    let w = getRandomWrong(3, q);
    let allOpt = [q,...w].sort(()=>Math.random()-0.5);
    allOpt.forEach(item=>{
        let d = document.createElement("div"); d.className = "option";
        d.innerHTML = `<div class="option-main">${item.correct}</div><div class="option-desc">${item.explain}</div>`;
        d.onclick = () => checkAnswer(item, q);
        options.appendChild(d);
    });
    prevBtn.disabled = currentIndex === 0;
    nextBtn.disabled = false;
}

function checkAnswer(sel, q) {
    if (sel === q) correctCount++; else { wrongList.push(q); addToVocabBook(q); }
    if (currentIndex < currentQuestions.length - 1) { currentIndex++; saveProgress(); showQuestion(); } else { showResult(); }
}

function showResult() {
    quiz.classList.add("hidden"); quiz.classList.remove("active-quiz"); result.classList.remove("hidden");
    let total = currentQuestions.length; let acc = ((correctCount/total)*100).toFixed(1);
    score.innerText = `Total: ${total} • Correct: ${correctCount} • Accuracy: ${acc}%`;

    if (wrongList.length === 0) {
        wrongListEl.classList.add("hidden");
        score.insertAdjacentHTML("afterend", `<div class="perfect-msg">🎉 Perfect!</div>`);
    } else {
        wrongListEl.classList.remove("hidden");
        wrongListEl.innerHTML = `<h3>❌ Wrong Words</h3>` + wrongList.map(i => `
            <div class="wrong-item"><strong>${i.word}</strong><p>${i.correct}</p><p>${i.explain}</p></div>
        `).join('');
    }
    renderVocabBook();
    saveFinishState();
    syncTeacherData();
}

// ===================== 教师端同步核心代码 =====================
function syncTeacherData() {
    if (!currentUser) return;
    let users = loadUsers();
    let today = new Date().toLocaleDateString();
    let u = users[currentUser];

    if (!u.quizDaysSet) u.quizDaysSet = {};
    let daySet = new Set(Object.keys(u.quizDaysSet));
    daySet.add(today);
    u.quizDays = daySet.size;
    u.quizDaysSet = Object.fromEntries(daySet);
    u.lastActive = today;
    u.accuracy = ((correctCount / currentQuestions.length) * 100).toFixed(1);

    saveUsers(users);
}

function restart() { location.reload(); }

window.onload = function(){
    let u = localStorage.getItem("currentUser");
    if (u && loadUsers()[u]) {
        currentUser = u;
        authPage.classList.add("hidden"); mainPage.classList.remove("hidden");
        userInfo.textContent = ""; renderVocabBook();
        let prog = JSON.parse(localStorage.getItem("quizProgress"));
        if (prog) {
            if (prog.isFinish) {
                settings.classList.remove("hidden"); document.querySelector(".start-section").classList.remove("hidden"); quiz.classList.add("hidden"); result.classList.add("hidden");
            } else {
                currentQuestions = prog.currentQuestions; currentIndex = prog.currentIndex; correctCount = prog.correctCount; wrongList = prog.wrongList;
                settings.classList.add("hidden"); document.querySelector(".start-section").classList.add("hidden"); quiz.classList.remove("hidden"); result.classList.add("hidden"); quiz.classList.add("active-quiz");
                showQuestion();
            }
        }
    }
};
